<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experiment 10 - Scientific Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f0f5; }
        header {
            background-color: #c2185b;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container { width: 45%; margin: 30px auto; }
        .calculator {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #c2185b; text-align: center; }
        #display {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: right;
            border: 2px solid #c2185b;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: #fff0f5;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        button {
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #f8f0f5;
            color: #333;
            font-weight: bold;
        }
        button:hover { background: #f8bbd0; }
        .operator { background: #c2185b; color: white; }
        .operator:hover { background: #880e4f; }
        .scientific { background: #880e4f; color: white; }
        .scientific:hover { background: #560027; }
        .equals { background: #c2185b; color: white; grid-column: span 2; }
        .equals:hover { background: #880e4f; }
        .clear { background: #e53935; color: white; grid-column: span 2; }
        .clear:hover { background: #b71c1c; }
    </style>
</head>
<body>

    <header>
        <h1>👗 StyleHub - Scientific Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator">
            <h2>🔬 Scientific Calculator</h2>
            <input type="text" id="display" readonly placeholder="0">

            <div class="buttons">
                <!-- Scientific buttons -->
                <button class="scientific" onclick="calcFunc('sin')">sin</button>
                <button class="scientific" onclick="calcFunc('cos')">cos</button>
                <button class="scientific" onclick="calcFunc('tan')">tan</button>
                <button class="scientific" onclick="calcFunc('sqrt')">√</button>

                <button class="scientific" onclick="calcFunc('log')">log</button>
                <button class="scientific" onclick="calcFunc('ln')">ln</button>
                <button class="scientific" onclick="press('Math.PI')">π</button>
                <button class="scientific" onclick="calcFunc('square')">x²</button>

                <!-- Number buttons -->
                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>
                <button class="operator" onclick="press('/')">÷</button>

                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>
                <button class="operator" onclick="press('*')">×</button>

                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>
                <button class="operator" onclick="press('-')">−</button>

                <button onclick="press('0')">0</button>
                <button onclick="press('.')">.</button>
                <button class="operator" onclick="press('+')">+</button>
                <button class="operator" onclick="deleteLast()">⌫</button>

                <button class="clear" onclick="clearDisplay()">Clear</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script>
        function press(val) {
            if (val === 'Math.PI') {
                document.getElementById("display").value += '3.14159';
            } else {
                document.getElementById("display").value += val;
            }
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function deleteLast() {
            let val = document.getElementById("display").value;
            document.getElementById("display").value = val.slice(0, -1);
        }

        function calculate() {
            try {
                let result = eval(document.getElementById("display").value);
                document.getElementById("display").value = parseFloat(result.toFixed(8));
            } catch {
                document.getElementById("display").value = "Error";
            }
        }

        function calcFunc(func) {
            let val = parseFloat(document.getElementById("display").value);
            let result;
            switch(func) {
                case 'sin':
                    result = Math.sin(val * Math.PI / 180);
                    break;
                case 'cos':
                    result = Math.cos(val * Math.PI / 180);
                    break;
                case 'tan':
                    result = Math.tan(val * Math.PI / 180);
                    break;
                case 'sqrt':
                    result = Math.sqrt(val);
                    break;
                case 'log':
                    result = Math.log10(val);
                    break;
                case 'ln':
                    result = Math.log(val);
                    break;
                case 'square':
                    result = val * val;
                    break;
            }
            document.getElementById("display").value = parseFloat(result.toFixed(8));
        }
    </script>

</body>
</html>
