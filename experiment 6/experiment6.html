<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experiment 6 - Form Validation</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f0f5; }
        header {
            background-color: #c2185b;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container { width: 50%; margin: 30px auto; }
        .form-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #c2185b; text-align: center; }
        .form-group { margin: 15px 0; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input:focus { border-color: #c2185b; outline: none; }
        .error { color: red; font-size: 13px; display: none; }
        button {
            width: 100%;
            background: #c2185b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #880e4f; }
        #successMsg {
            background: #e8f5e9;
            color: green;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <h1>👗 StyleHub - Customer Registration</h1>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>📝 Register Here</h2>

            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
                <span class="error" id="nameErr">❌ Name is required!</span>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
                <span class="error" id="emailErr">❌ Valid email is required!</span>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="text" id="phone" placeholder="Enter 10 digit number">
                <span class="error" id="phoneErr">❌ Enter valid 10 digit number!</span>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Min 6 characters">
                <span class="error" id="passErr">❌ Password must be 6+ characters!</span>
            </div>

            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" id="confirmPass" placeholder="Repeat password">
                <span class="error" id="confirmErr">❌ Passwords do not match!</span>
            </div>

            <button onclick="validateForm()">Register Now 🛍️</button>

            <div id="successMsg">✅ Registration Successful! Welcome to StyleHub! 👗</div>
        </div>
    </div>

    <script>
        function validateForm() {
            let valid = true;

            let name = document.getElementById("name").value;
            if (name == "") {
                document.getElementById("nameErr").style.display = "block";
                valid = false;
            } else {
                document.getElementById("nameErr").style.display = "none";
            }

            let email = document.getElementById("email").value;
            if (email == "" || !email.includes("@")) {
                document.getElementById("emailErr").style.display = "block";
                valid = false;
            } else {
                document.getElementById("emailErr").style.display = "none";
            }

            let phone = document.getElementById("phone").value;
            if (phone.length != 10 || isNaN(phone)) {
                document.getElementById("phoneErr").style.display = "block";
                valid = false;
            } else {
                document.getElementById("phoneErr").style.display = "none";
            }

            let pass = document.getElementById("password").value;
            if (pass.length < 6) {
                document.getElementById("passErr").style.display = "block";
                valid = false;
            } else {
                document.getElementById("passErr").style.display = "none";
            }

            let confirmPass = document.getElementById("confirmPass").value;
            if (confirmPass != pass) {
                document.getElementById("confirmErr").style.display = "block";
                valid = false;
            } else {
                document.getElementById("confirmErr").style.display = "none";
            }

            if (valid) {
                document.getElementById("successMsg").style.display = "block";
            }
        }
    </script>

</body>
</html>
